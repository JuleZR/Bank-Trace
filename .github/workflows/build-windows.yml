name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pillow pymupdf

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --clean bank_trace.spec

      - name: Rename executable
        shell: pwsh
        run: |
          Rename-Item -Path "dist/BankTrace.exe" -NewName "BankTrace-${{ github.ref_name }}-windows-x64.exe"

      - name: Upload artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: BankTrace-${{ github.ref_name }}-windows-x64
          path: dist/BankTrace-${{ github.ref_name }}-windows-x64.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BankTrace-${{ github.ref_name }}-windows-x64.exe
